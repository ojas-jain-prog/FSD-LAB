<!DOCTYPE html>
<html>
<head>
    <title>Experiment 3</title>
    <style>
body {
    font-family: Arial;
    background-color: #f2f2f2;
    text-align: center;
}

form {
    background: white;
    padding: 20px;
    width: 300px;
    margin: auto;
    border-radius: 8px;
}

input {
    width: 90%;
    padding: 8px;
}

button {
    background-color: green;
    color: white;
    padding: 10px;
    border: none;
    width: 100%;
}
</style>
</head>
<body>

<h2>Experiment 3</h2>
<p>Validate Input Fields in HTML Form</p>

<form id="myForm">
    <input type="text" id="firstName" placeholder="Enter first name"><br><br>

    <input type="text" id="lastName" placeholder="Enter last name"><br><br>

    <input type="email" id="email" placeholder="Enter email address"><br><br>

    <input type="password" id="password" placeholder="Enter password"><br><br>

    <input type="text" id="phone" placeholder="Enter phone number"><br><br>

    <button type="submit">Submit</button>
</form>

<script src="script.js"></script>

</body>
</html>
